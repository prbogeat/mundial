<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cuadro Eliminatorias Mundial 2026</title>
  <style>
    :root {
      --bg-1: #f8fafc;
      --bg-2: #e2e8f0;
      --ink: #0f172a;
      --muted: #475569;
      --card: #ffffff;
      --line: #cbd5e1;
      --accent: #0ea5e9;
      --winner: #16a34a;
      --loser-bg: #f8fafc;
      --shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #dbeafe 0%, var(--bg-1) 40%),
                  linear-gradient(120deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .shell {
      padding: 18px;
      max-width: 2300px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .title {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.3px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .density-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      font-size: 0.84rem;
      color: var(--muted);
      min-height: 36px;
    }

    .sheet-control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      padding: 4px 6px;
      min-height: 36px;
    }

    .sheet-control input {
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      min-width: 240px;
      font-size: 0.86rem;
    }

    button.mini {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .density-control input[type="range"] {
      width: 130px;
      accent-color: #0ea5e9;
    }

    .density-value {
      min-width: 42px;
      text-align: right;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    button.control {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.92rem;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    button.control:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .status {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .tabs {
      display: inline-flex;
      gap: 6px;
      margin: 0 0 10px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
    }

    .tab-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #ffffff;
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    .view.hidden {
      display: none;
    }

    .board-wrap {
      position: relative;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.65);
      min-height: 860px;
    }

    .connections {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }

    .bracket {
      position: relative;
      z-index: 1;
      min-width: 1680px;
      min-height: 840px;
      padding: 12px;
    }

    .round-label {
      position: absolute;
      top: 8px;
      transform: translateX(-50%);
      background: rgba(248, 250, 252, 0.92);
      backdrop-filter: blur(3px);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.65px;
      z-index: 3;
      text-align: center;
      white-space: nowrap;
    }

    .match {
      position: absolute;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 10px;
      animation: fadeIn 280ms ease;
      width: 236px;
      min-height: 128px;
    }

    .match.center-match {
      min-height: 140px;
    }

    .meta {
      font-size: 0.76rem;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .team-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      margin: 5px 0;
      background: #ffffff;
      cursor: pointer;
      text-align: left;
      transition: border-color 140ms ease, transform 120ms ease, background 140ms ease;
      min-height: 42px;
    }

    .match[data-side="left"] .team-btn:hover:not(:disabled) {
      transform: translateX(2px);
      border-color: var(--accent);
    }

    .match[data-side="right"] .team-btn:hover:not(:disabled) {
      transform: translateX(-2px);
      border-color: var(--accent);
    }

    .match[data-side="center"] .team-btn:hover:not(:disabled) {
      border-color: var(--accent);
    }

    .team-btn:disabled {
      cursor: not-allowed;
      background: var(--loser-bg);
      color: #64748b;
    }

    .team-btn.winner {
      border-color: var(--winner);
      background: #f0fdf4;
      box-shadow: inset 0 0 0 1px #bbf7d0;
    }

    .flag {
      width: 22px;
      height: 16px;
      border-radius: 2px;
      border: 1px solid #cbd5e1;
      object-fit: cover;
      flex: 0 0 auto;
      background: #fff;
    }

    .team-name {
      font-size: 0.92rem;
    }

    .hint {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 5px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 18px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.7);
      margin: 14px;
    }

    .list-view {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.68);
      padding: 14px;
    }

    .list-filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .list-filters label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .list-filters select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      min-width: 190px;
    }

    .list-filters input[type="search"] {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      min-width: 220px;
    }

    .list-filters .mini {
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.84rem;
    }

    .list-group {
      margin: 12px 0 18px;
    }

    .list-group-title {
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: var(--ink);
      letter-spacing: 0.2px;
    }

    .list-item {
      display: grid;
      grid-template-columns: 132px 1fr 130px;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      margin-bottom: 8px;
    }

    .list-item-meta {
      font-size: 0.82rem;
      color: var(--muted);
      display: grid;
      gap: 4px;
    }

    .list-item-time {
      font-size: 0.95rem;
      color: var(--ink);
      font-weight: 600;
    }

    .teams-inline {
      display: grid;
      gap: 5px;
    }

    .team-inline {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.92rem;
      color: var(--ink);
    }

    .winner-chip {
      justify-self: end;
      font-size: 0.74rem;
      color: #166534;
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      padding: 5px 8px;
      border-radius: 999px;
      text-align: right;
    }

    .connection-line {
      fill: none;
      stroke: #94a3b8;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.95;
    }

    .connection-line.active {
      stroke: #16a34a;
      stroke-width: 2.4;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1200px) {
      .shell { padding: 10px; }
      .board-wrap { min-height: 720px; }
      .bracket { min-width: 1520px; min-height: 720px; }
      .list-item { grid-template-columns: 1fr; }
      .winner-chip { justify-self: start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <h1 class="title">Cuadro de Cruces - Mundial 2026</h1>
      <div class="controls">
        <button id="reloadBtn" class="control" type="button">Recargar CSV base</button>
        <button id="uploadBtn" class="control" type="button">Cargar otro CSV</button>
        <span class="sheet-control">
          <input id="sheetUrl" type="text" placeholder="URL de Google Sheet (opcional)">
          <button id="loadSheetBtn" class="mini" type="button">Cargar Sheet</button>
          <button id="drivePickerBtn" class="mini" type="button">Elegir en Drive</button>
        </span>
        <button id="resetBtn" class="control" type="button">Reiniciar ganadores</button>
        <button id="exportBtn" class="control" type="button">Descargar CSV con cruces</button>
        <label class="density-control" for="densityRange">
          Separacion
          <input id="densityRange" type="range" min="100" max="170" step="5" value="130">
          <span id="densityValue" class="density-value">130%</span>
        </label>
      </div>
    </div>

    <p id="status" class="status">Preparando cuadro...</p>
    <div class="tabs">
      <button id="tabBracket" type="button" class="tab-btn active">Cuadro de cruces</button>
      <button id="tabList" type="button" class="tab-btn">Partidos por dia</button>
    </div>
    <input id="csvInput" type="file" accept=".csv,text/csv" style="display:none">
    <div id="bracketView" class="view">
      <div id="boardWrap" class="board-wrap">
        <svg id="connections" class="connections"></svg>
        <div id="board" class="bracket"></div>
      </div>
    </div>
    <div id="listView" class="view hidden list-view">
      <div class="list-filters">
        <label for="dayFilter">Filtrar por fecha:</label>
        <select id="dayFilter">
          <option value="">Todos los dias</option>
        </select>
        <label for="teamFilter">Equipo:</label>
        <input id="teamFilter" type="search" placeholder="Ej: España, Brasil, Japon">
        <button id="clearFiltersBtn" type="button" class="mini">Limpiar filtros</button>
      </div>
      <div id="listContainer"></div>
    </div>
  </div>

  <script>
    const CSV_FILE = "Calendario Eliminatorias Mundial 2026 - 32 equipos.csv";
    const STORAGE_KEY = "mundial2026.bracket.picks.v1";
    const SHEET_URL_STORAGE_KEY = "mundial2026.sheet.url.v1";
    const GOOGLE_API_KEY = "AIzaSyCo4B-qB4FQdHwPwHbcQZwuEkfKDgmRv1k";
    const GOOGLE_CLIENT_ID = "735967005380-llc7gn72d7qg9boe59ea98rqnratca8b.apps.googleusercontent.com";

    const PHASE_D16 = "Dieciseisavos de final";
    const PHASE_OCT = "Octavos de final";
    const PHASE_CUA = "Cuartos de final";
    const PHASE_SEMI = "Semifinales";

    const COUNTRY_CODE = {
      "sudafrica": "za",
      "canada": "ca",
      "alemania": "de",
      "paraguay": "py",
      "paises bajos": "nl",
      "marruecos": "ma",
      "brasil": "br",
      "japon": "jp",
      "francia": "fr",
      "suecia": "se",
      "costa de marfil": "ci",
      "noruega": "no",
      "mexico": "mx",
      "ecuador": "ec",
      "inglaterra": "gb",
      "rd congo": "cd",
      "estados unidos": "us",
      "bosnia y herzegovina": "ba",
      "belgica": "be",
      "senegal": "sn",
      "portugal": "pt",
      "croacia": "hr",
      "espana": "es",
      "austria": "at",
      "suiza": "ch",
      "argelia": "dz",
      "argentina": "ar",
      "cabo verde": "cv",
      "colombia": "co",
      "ghana": "gh",
      "australia": "au",
      "egipto": "eg"
    };

    const state = {
      matches: [],
      byId: new Map(),
      sideById: new Map(),
      layout: null,
      activeView: "bracket"
    };

    const boardEl = document.getElementById("board");
    const boardWrapEl = document.getElementById("boardWrap");
    const bracketViewEl = document.getElementById("bracketView");
    const listViewEl = document.getElementById("listView");
    const connectionsEl = document.getElementById("connections");
    const statusEl = document.getElementById("status");
    const csvInputEl = document.getElementById("csvInput");
    const densityRangeEl = document.getElementById("densityRange");
    const densityValueEl = document.getElementById("densityValue");
    const dayFilterEl = document.getElementById("dayFilter");
    const teamFilterEl = document.getElementById("teamFilter");
    const clearFiltersBtnEl = document.getElementById("clearFiltersBtn");
    const sheetUrlEl = document.getElementById("sheetUrl");
    const loadSheetBtnEl = document.getElementById("loadSheetBtn");
    const drivePickerBtnEl = document.getElementById("drivePickerBtn");
    const listContainerEl = document.getElementById("listContainer");
    const tabBracketEl = document.getElementById("tabBracket");
    const tabListEl = document.getElementById("tabList");

    const layoutPrefs = {
      spacingScale: 1.3
    };

    const pickerState = {
      pickerApiLoaded: false,
      gisLoaded: false,
      tokenClient: null
    };

    document.getElementById("uploadBtn").addEventListener("click", () => csvInputEl.click());
    document.getElementById("reloadBtn").addEventListener("click", () => loadDefaultCsv({ applyStoredPicks: false, clearStoredPicks: true }));
    document.getElementById("exportBtn").addEventListener("click", () => exportCurrentCsv());
    loadSheetBtnEl.addEventListener("click", () => loadFromSheetInput());
    drivePickerBtnEl.addEventListener("click", () => openDrivePicker());
    tabBracketEl.addEventListener("click", () => switchView("bracket"));
    tabListEl.addEventListener("click", () => switchView("list"));
    dayFilterEl.addEventListener("change", () => renderListView());
    teamFilterEl.addEventListener("input", () => renderListView());
    clearFiltersBtnEl.addEventListener("click", () => {
      dayFilterEl.value = "";
      teamFilterEl.value = "";
      renderListView();
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      for (const match of state.matches) {
        match.selectedWinnerSide = null;
      }
      recomputeAll();
      savePicks();
      render();
      renderListView();
      setStatus("Ganadores reiniciados.");
    });

    csvInputEl.addEventListener("change", async (ev) => {
      const file = ev.target.files && ev.target.files[0];
      if (!file) return;
      const text = await file.text();
      clearStoredPicks();
      buildFromCsv(text, { applyStoredPicks: false });
      storeSheetUrl("");
      sheetUrlEl.value = "";
      setStatus(`CSV cargado manualmente: ${file.name}`);
      csvInputEl.value = "";
    });

    densityRangeEl.addEventListener("input", () => {
      layoutPrefs.spacingScale = Number(densityRangeEl.value) / 100;
      densityValueEl.textContent = `${densityRangeEl.value}%`;
      if (state.matches.length) render();
    });

    function switchView(view) {
      state.activeView = view;
      const showBracket = view === "bracket";
      bracketViewEl.classList.toggle("hidden", !showBracket);
      listViewEl.classList.toggle("hidden", showBracket);
      tabBracketEl.classList.toggle("active", showBracket);
      tabListEl.classList.toggle("active", !showBracket);
      if (showBracket && state.matches.length) {
        drawConnections();
      }
      if (!showBracket) {
        renderListView();
      }
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function savedSheetUrl() {
      try {
        return localStorage.getItem(SHEET_URL_STORAGE_KEY) || "";
      } catch (err) {
        return "";
      }
    }

    function storeSheetUrl(raw) {
      try {
        if (raw) {
          localStorage.setItem(SHEET_URL_STORAGE_KEY, raw);
        } else {
          localStorage.removeItem(SHEET_URL_STORAGE_KEY);
        }
      } catch (err) {
        // Ignore storage errors.
      }
    }

    function googleSheetToCsvUrl(rawUrl) {
      const raw = (rawUrl || "").trim();
      if (!raw) return [];

      let url;
      try {
        url = new URL(raw);
      } catch (err) {
        return [];
      }

      const lower = raw.toLowerCase();
      if (lower.includes("output=csv") || lower.includes("format=csv")) {
        return [raw];
      }

      const published = url.pathname.match(/\/spreadsheets\/d\/e\/([a-zA-Z0-9-_]+)\/(pub|pubhtml)/);
      if (published) {
        return [`https://docs.google.com/spreadsheets/d/e/${published[1]}/pub?output=csv`];
      }

      const m = url.pathname.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (!m) return [];

      const spreadsheetId = m[1];
      const gid = url.searchParams.get("gid") || "0";
      return [
        `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${gid}`,
        `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&gid=${gid}`
      ];
    }

    function looksLikeCsv(text) {
      if (!text) return false;
      const trimmed = text.trim();
      if (!trimmed) return false;
      if (/^<!doctype html/i.test(trimmed) || /^<html/i.test(trimmed)) return false;
      const firstLine = trimmed.split(/\r?\n/, 1)[0] || "";
      return firstLine.includes(",");
    }

    async function loadSheetFromRawUrl(raw, options = {}) {
      const candidates = googleSheetToCsvUrl(raw);
      if (!candidates.length) return false;

      const applyStored = options.applyStoredPicks !== false;
      const clearStored = options.clearStoredPicks === true;

      for (const csvUrl of candidates) {
        try {
          const response = await fetch(csvUrl, { cache: "no-store" });
          if (!response.ok) continue;
          const csvText = await response.text();
          if (!looksLikeCsv(csvText)) continue;
          if (clearStored) clearStoredPicks();
          buildFromCsv(csvText, { applyStoredPicks: applyStored });
          return true;
        } catch (err) {
          // Try the next candidate endpoint.
        }
      }

      return false;
    }

    async function loadFromSheetInput() {
      const raw = (sheetUrlEl.value || "").trim();
      if (!raw) {
        setStatus("Pega una URL de Google Sheet para cargarla.");
        return;
      }

      if (!googleSheetToCsvUrl(raw).length) {
        setStatus("No pude interpretar esa URL de Google Sheet.");
        return;
      }

      try {
        const ok = await loadSheetFromRawUrl(raw, { applyStoredPicks: false, clearStoredPicks: true });
        if (!ok) throw new Error("sheet-load-failed");
        storeSheetUrl(raw);
        setStatus("Datos cargados desde Google Sheet.");
      } catch (err) {
        setStatus("No pude leer la Google Sheet. Comprueba que sea accesible (publicada o compartida en lectura).");
      }
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.defer = true;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`No se pudo cargar ${src}`));
        document.head.appendChild(script);
      });
    }

    async function ensureDrivePickerApis() {
      if (!pickerState.pickerApiLoaded) {
        if (!window.gapi) {
          await loadScript("https://apis.google.com/js/api.js");
        }
        await new Promise((resolve) => {
          window.gapi.load("picker", {
            callback: resolve
          });
        });
        pickerState.pickerApiLoaded = true;
      }

      if (!pickerState.gisLoaded) {
        if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) {
          await loadScript("https://accounts.google.com/gsi/client");
        }
        pickerState.gisLoaded = true;
      }

      if (!pickerState.tokenClient) {
        pickerState.tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.readonly",
          callback: ""
        });
      }
    }

    async function openDrivePicker() {
      if (!GOOGLE_API_KEY || !GOOGLE_CLIENT_ID) {
        setStatus("Para usar 'Elegir en Drive' debes configurar GOOGLE_API_KEY y GOOGLE_CLIENT_ID en cuadro.html.");
        return;
      }

      try {
        await ensureDrivePickerApis();
      } catch (err) {
        setStatus("No pude cargar los SDK de Google para el Drive Picker.");
        return;
      }

      pickerState.tokenClient.callback = (tokenResponse) => {
        if (tokenResponse.error) {
          setStatus("No se pudo autorizar acceso a Drive.");
          return;
        }

        const docsView = new window.google.picker.DocsView(window.google.picker.ViewId.SPREADSHEETS)
          .setIncludeFolders(false)
          .setSelectFolderEnabled(false);

        const picker = new window.google.picker.PickerBuilder()
          .setDeveloperKey(GOOGLE_API_KEY)
          .setOAuthToken(tokenResponse.access_token)
          .addView(docsView)
          .setTitle("Selecciona una Google Sheet")
          .setCallback((data) => {
            if (data.action !== window.google.picker.Action.PICKED) return;
            const doc = data.docs && data.docs[0];
            if (!doc) return;
            const docId = doc.id;
            const docUrl = doc.url || `https://docs.google.com/spreadsheets/d/${docId}/edit`;
            sheetUrlEl.value = docUrl;
            loadFromSheetInput();
          })
          .build();

        picker.setVisible(true);
      };

      pickerState.tokenClient.requestAccessToken({ prompt: "consent" });
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      if (!/[",\r\n]/.test(text)) return text;
      return `"${text.replace(/"/g, '""')}"`;
    }

    function slotValueForExport(slot) {
      if (slot.team) return slot.team;
      if (slot.baseTeam) return slot.baseTeam;
      return slot.rawLabel || "";
    }

    function downloadTextAsFile(fileName, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportCurrentCsv() {
      if (!state.matches.length) {
        setStatus("No hay datos cargados para exportar.");
        return;
      }

      const headers = [
        "Fase",
        "Partido",
        "Fecha",
        "Hora (Madrid CEST)",
        "Local",
        "Visitante",
        "Cruce Siguiente",
        "Ganador Elegido"
      ];

      const rows = state.matches
        .slice()
        .sort((a, b) => a.id - b.id)
        .map((match) => {
          const winner = match.selectedWinnerSide ? (match.slots[match.selectedWinnerSide].team || "") : "";
          return [
            match.phase,
            match.id,
            match.date,
            match.time,
            slotValueForExport(match.slots.local),
            slotValueForExport(match.slots.visitante),
            match.cruce,
            winner
          ];
        });

      const csvLines = [headers, ...rows].map((row) => row.map(csvEscape).join(","));
      const stamp = new Date().toISOString().replace(/[-:]/g, "").replace("T", "_").slice(0, 15);
      const fileName = `cruces_guardados_${stamp}.csv`;

      downloadTextAsFile(fileName, `\uFEFF${csvLines.join("\r\n")}`, "text/csv;charset=utf-8");
      setStatus(`CSV exportado: ${fileName}`);
    }

    function safeStorageGet() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (err) {
        return {};
      }
    }

    function savePicks() {
      const picks = {};
      for (const match of state.matches) {
        if (match.selectedWinnerSide) {
          picks[String(match.id)] = match.selectedWinnerSide;
        }
      }
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(picks));
      } catch (err) {
        // Ignore quota or privacy mode storage errors.
      }
    }

    function clearStoredPicks() {
      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch (err) {
        // Ignore storage errors.
      }
    }

    function applyStoredPicks() {
      const picks = safeStorageGet();
      for (const match of state.matches) {
        const value = picks[String(match.id)];
        if (value === "local" || value === "visitante") {
          match.selectedWinnerSide = value;
        }
      }
    }

    function normalizeText(input) {
      return (input || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function parseCsvLine(line) {
      const out = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          out.push(current);
          current = "";
        } else {
          current += ch;
        }
      }

      out.push(current);
      return out;
    }

    function parseCsv(text) {
      const lines = text
        .replace(/^\uFEFF/, "")
        .split(/\r?\n/)
        .map((l) => l.trim())
        .filter(Boolean);

      if (!lines.length) return [];

      const headers = parseCsvLine(lines[0]);
      const rows = [];

      for (let i = 1; i < lines.length; i += 1) {
        const values = parseCsvLine(lines[i]);
        const row = {};
        headers.forEach((h, idx) => {
          row[h] = (values[idx] || "").trim();
        });
        rows.push(row);
      }

      return rows;
    }

    function parseReference(label) {
      const m = (label || "").trim().match(/^(Ganador|Perdedor)\s+P(\d+)$/i);
      if (!m) return null;
      return {
        outcome: normalizeText(m[1]) === "perdedor" ? "loser" : "winner",
        matchId: Number(m[2])
      };
    }

    function parseCruceTarget(cruce) {
      const m = (cruce || "").match(/Pasa\s+al\s+P(\d+)/i);
      return m ? Number(m[1]) : null;
    }

    function createSlot(raw) {
      const ref = parseReference(raw);
      return {
        rawLabel: raw,
        baseTeam: ref ? null : raw,
        team: ref ? null : raw,
        source: ref ? { ...ref, inferred: false } : null
      };
    }

    function buildFromCsv(csvText, options = {}) {
      const applyStored = options.applyStoredPicks !== false;
      const rows = parseCsv(csvText);

      const matches = rows.map((row) => {
        const id = Number(row.Partido);
        return {
          id,
          phase: row.Fase,
          date: row.Fecha,
          time: row["Hora (Madrid CEST)"],
          cruce: row["Cruce Siguiente"],
          slots: {
            local: createSlot(row.Local),
            visitante: createSlot(row.Visitante)
          },
          selectedWinnerSide: null
        };
      }).sort((a, b) => a.id - b.id);

      state.matches = matches;
      state.byId = new Map(matches.map((m) => [m.id, m]));

      inferMissingDependencies();
      computeSides();
      if (applyStored) applyStoredPicks();
      recomputeAll();
      inferWinnersFromNextRound();
      recomputeAll();
      populateDayFilter();
      render();
      renderListView();
    }

    function populateDayFilter() {
      const previous = dayFilterEl.value;
      const days = [];
      const seen = new Set();

      for (const match of state.matches) {
        const day = (match.date || "").trim();
        if (!day || seen.has(day)) continue;
        seen.add(day);
        days.push(day);
      }

      dayFilterEl.innerHTML = "";
      const all = document.createElement("option");
      all.value = "";
      all.textContent = "Todos los dias";
      dayFilterEl.appendChild(all);

      for (const day of days) {
        const option = document.createElement("option");
        option.value = day;
        option.textContent = day;
        dayFilterEl.appendChild(option);
      }

      if (previous && days.includes(previous)) {
        dayFilterEl.value = previous;
      }
    }

    function computeSides() {
      const sideById = new Map();
      sideById.set(101, "left");
      sideById.set(102, "right");
      sideById.set(104, "center");
      sideById.set(103, "center");

      const queue = [101, 102];
      while (queue.length) {
        const currentId = queue.shift();
        const current = state.byId.get(currentId);
        const currentSide = sideById.get(currentId);
        if (!current || !currentSide || currentSide === "center") continue;

        for (const slotSide of ["local", "visitante"]) {
          const src = current.slots[slotSide].source;
          if (!src || src.outcome !== "winner") continue;
          if (!sideById.has(src.matchId)) {
            sideById.set(src.matchId, currentSide);
            queue.push(src.matchId);
          }
        }
      }

      for (const match of state.matches) {
        if (!sideById.has(match.id)) {
          sideById.set(match.id, match.phase === "Final" || match.phase === "Tercer Puesto" ? "center" : "left");
        }
      }

      state.sideById = sideById;
    }

    function inferMissingDependencies() {
      const winnersToTarget = new Map();

      for (const match of state.matches) {
        const target = parseCruceTarget(match.cruce);
        if (!target) continue;
        if (!winnersToTarget.has(target)) winnersToTarget.set(target, []);
        winnersToTarget.get(target).push(match.id);
      }

      for (const targetId of winnersToTarget.keys()) {
        const target = state.byId.get(targetId);
        if (!target) continue;

        const explicitSources = new Set();
        for (const side of ["local", "visitante"]) {
          const src = target.slots[side].source;
          if (src && src.outcome === "winner") explicitSources.add(src.matchId);
        }

        const pendingSources = winnersToTarget
          .get(targetId)
          .filter((sourceId) => !explicitSources.has(sourceId))
          .sort((a, b) => a - b);

        const freeSides = ["local", "visitante"].filter((side) => !target.slots[side].source);

        for (let i = 0; i < pendingSources.length && i < freeSides.length; i += 1) {
          target.slots[freeSides[i]].source = {
            matchId: pendingSources[i],
            outcome: "winner",
            inferred: true
          };
        }
      }
    }

    function inferWinnersFromNextRound() {
      const normalizeTeam = (t) => (t || "").trim().toLowerCase();

      for (const match of state.matches) {
        if (match.selectedWinnerSide) continue;

        const targetId = parseCruceTarget(match.cruce);
        if (!targetId) continue;

        const nextMatch = state.byId.get(targetId);
        if (!nextMatch) continue;

        const localTeam = match.slots.local.baseTeam;
        const visitorTeam = match.slots.visitante.baseTeam;
        if (!localTeam || !visitorTeam) continue;

        const localCandidates = ["local", "visitante"].filter((side) => {
          const slot = nextMatch.slots[side];
          return slot && slot.baseTeam && !parseReference(slot.baseTeam);
        });

        const normLocal = normalizeTeam(localTeam);
        const normVisitor = normalizeTeam(visitorTeam);

        const matchedSide = localCandidates.find((side) => normalizeTeam(nextMatch.slots[side].baseTeam) === normLocal) || null;
        const matchedVisitorSide = localCandidates.find((side) => normalizeTeam(nextMatch.slots[side].baseTeam) === normVisitor) || null;

        if (matchedSide && !matchedVisitorSide) {
          match.selectedWinnerSide = "local";
        } else if (matchedVisitorSide && !matchedSide) {
          match.selectedWinnerSide = "visitante";
        }
      }
    }

    function teamFromOutcome(source) {
      const match = state.byId.get(source.matchId);
      if (!match) return null;

      const localTeam = match.slots.local.team;
      const visitorTeam = match.slots.visitante.team;

      if (source.outcome === "winner") {
        if (!match.selectedWinnerSide) return null;
        return match.slots[match.selectedWinnerSide].team || null;
      }

      if (!match.selectedWinnerSide || !localTeam || !visitorTeam) return null;
      return match.selectedWinnerSide === "local" ? visitorTeam : localTeam;
    }

    function recomputeAll() {
      let loops = 0;
      let dirty = false;

      do {
        dirty = false;
        loops += 1;

        for (const match of state.matches) {
          match.slots.local.team = match.slots.local.baseTeam;
          match.slots.visitante.team = match.slots.visitante.baseTeam;
        }

        for (const match of state.matches) {
          for (const side of ["local", "visitante"]) {
            const slot = match.slots[side];
            if (!slot.source) continue;
            const resolved = teamFromOutcome(slot.source);
            if (resolved) slot.team = resolved;
          }
        }

        for (const match of state.matches) {
          const side = match.selectedWinnerSide;
          if (!side) continue;

          const selectedTeam = match.slots[side].team;
          const otherTeam = match.slots[side === "local" ? "visitante" : "local"].team;

          if (!selectedTeam || !otherTeam || selectedTeam === otherTeam) {
            match.selectedWinnerSide = null;
            dirty = true;
          }
        }
      } while (dirty && loops < 6);
    }

    function flagUrl(countryName) {
      const key = normalizeText(countryName);
      const code = COUNTRY_CODE[key];
      if (!code) return null;
      return `https://flagcdn.com/w40/${code}.png`;
    }

    function renderTeamButton(match, side) {
      const slot = match.slots[side];

      btn.addEventListener("click", () => {
        match.selectedWinnerSide = match.selectedWinnerSide === side ? null : side;

      });

        img.addEventListener("error", () => { img.style.display = "none"; });
        btn.appendChild(img);

    function renderMatch(match, placement) {
      const card = document.createElement("article");
      card.className = "match";
      card.dataset.matchId = String(match.id);
      if (placement) {
        card.style.left = `${placement.x}px`;

        card.dataset.side = placement.side;
      }

    function shortPhase(phase) {
      if (phase === PHASE_D16) return "Dieciseisavos";
      if (phase === PHASE_OCT) return "Octavos";
      if (phase === PHASE_CUA) return "Cuartos";
      if (phase === PHASE_SEMI) return "Semifinales";
      return phase;
    }

    function avg(nums) {
      if (!nums.length) return 0;
      return nums.reduce((sum, n) => sum + n, 0) / nums.length;
    }

    function winnerSourcesOf(match, side) {
      const ids = [];
      for (const slotSide of ["local", "visitante"]) {
        const src = match.slots[slotSide].source;
        if (!src || src.outcome !== "winner") continue;
        if (state.sideById.get(src.matchId) !== side) continue;
        ids.push(src.matchId);
      }
      return ids;
    }

    function buildPhaseOrderBySide() {
      const index = new Map();
      const phaseOrder = new Map();

      function visit(matchId, side, path) {
        const match = state.byId.get(matchId);
        if (!match) return;
        if (index.has(matchId)) return;

        index.set(matchId, path);

        const key = `${side}|${match.phase}`;
        if (!phaseOrder.has(key)) phaseOrder.set(key, []);
        phaseOrder.get(key).push({ id: matchId, path });

        for (const slot of ["local", "visitante"]) {
          const src = match.slots[slot].source;
          if (!src || src.outcome !== "winner") continue;
          if (state.sideById.get(src.matchId) !== side) continue;
          visit(src.matchId, side, `${path}${slot === "local" ? "0" : "1"}`);
        }
      }

      visit(101, "left", "");
      visit(102, "right", "");

      for (const items of phaseOrder.values()) {
        items.sort((a, b) => a.path.localeCompare(b.path));
      }

      return phaseOrder;
    }

    function orderedMatchesFor(side, phase, phaseOrder) {
      const key = `${side}|${phase}`;
      const ordered = phaseOrder.get(key);
      if (!ordered || !ordered.length) {
        return state.matches
          .filter((m) => m.phase === phase && state.sideById.get(m.id) === side)
          .sort((a, b) => a.id - b.id);
      }

      return ordered
        .map((item) => state.byId.get(item.id))
        .filter(Boolean);
    }

    function calculateLayout() {
      const scale = layoutPrefs.spacingScale;
      const CARD_W = 236;
      const CARD_H = 128;
      const COL_GAP = 38;
      const CENTER_GAP = 76;
      const MARGIN_X = 20;
      const START_Y = Math.round(92 + 20 * scale);
      const LEAF_GAP = Math.round(150 * scale);

      const leftX = {
        [PHASE_D16]: MARGIN_X,
        [PHASE_OCT]: MARGIN_X + (CARD_W + COL_GAP),
        [PHASE_CUA]: MARGIN_X + 2 * (CARD_W + COL_GAP),
        [PHASE_SEMI]: MARGIN_X + 3 * (CARD_W + COL_GAP)
      };

      const centerX = leftX[PHASE_SEMI] + CARD_W + CENTER_GAP;
      const rightSemiX = centerX + CARD_W + CENTER_GAP;

      const rightX = {
        [PHASE_SEMI]: rightSemiX,
        [PHASE_CUA]: rightSemiX + (CARD_W + COL_GAP),
        [PHASE_OCT]: rightSemiX + 2 * (CARD_W + COL_GAP),
        [PHASE_D16]: rightSemiX + 3 * (CARD_W + COL_GAP)
      };

      const positions = new Map();
      const phaseOrder = buildPhaseOrderBySide();

      for (const side of ["left", "right"]) {
        const phaseX = side === "left" ? leftX : rightX;
        const leaves = orderedMatchesFor(side, PHASE_D16, phaseOrder);

        leaves.forEach((match, idx) => {
          positions.set(match.id, { x: phaseX[PHASE_D16], y: START_Y + idx * LEAF_GAP, side });
        });

        for (const phase of [PHASE_OCT, PHASE_CUA, PHASE_SEMI]) {
          const matches = orderedMatchesFor(side, phase, phaseOrder);

          matches.forEach((match, idx) => {
            const srcIds = winnerSourcesOf(match, side);
            const srcYs = srcIds
              .map((id) => positions.get(id))
              .filter(Boolean)
              .map((p) => p.y);
            const fallbackY = START_Y + idx * LEAF_GAP * Math.max(1, Math.pow(2, [PHASE_OCT, PHASE_CUA, PHASE_SEMI].indexOf(phase)));
            const y = srcYs.length ? avg(srcYs) : fallbackY;
            positions.set(match.id, { x: phaseX[phase], y, side });
          });
        }
      }

      const leftSemiY = positions.get(101)?.y ?? START_Y + LEAF_GAP * 1.5;
      const rightSemiY = positions.get(102)?.y ?? START_Y + LEAF_GAP * 5.5;
      const finalY = avg([leftSemiY, rightSemiY]);
      const thirdY = finalY + CARD_H + Math.round(150 * scale);

      positions.set(104, { x: centerX, y: finalY, side: "center" });
      positions.set(103, { x: centerX, y: thirdY, side: "center" });

      const maxY = Math.max(...Array.from(positions.values()).map((p) => p.y));
      const height = Math.max(maxY + CARD_H + 110, START_Y + LEAF_GAP * 8 + 150);
      const width = rightX[PHASE_D16] + CARD_W + MARGIN_X;

      const labels = [
        { text: shortPhase(PHASE_D16), x: leftX[PHASE_D16] + CARD_W / 2 },
        { text: shortPhase(PHASE_OCT), x: leftX[PHASE_OCT] + CARD_W / 2 },
        { text: shortPhase(PHASE_CUA), x: leftX[PHASE_CUA] + CARD_W / 2 },
        { text: shortPhase(PHASE_SEMI), x: leftX[PHASE_SEMI] + CARD_W / 2 },
        { text: "Final", x: centerX + CARD_W / 2 },
        { text: shortPhase(PHASE_SEMI), x: rightX[PHASE_SEMI] + CARD_W / 2 },
        { text: shortPhase(PHASE_CUA), x: rightX[PHASE_CUA] + CARD_W / 2 },
        { text: shortPhase(PHASE_OCT), x: rightX[PHASE_OCT] + CARD_W / 2 },
        { text: shortPhase(PHASE_D16), x: rightX[PHASE_D16] + CARD_W / 2 }
      ];

      return { positions, width, height, labels };
    }

    function parseKickoffMinutes(timeText) {
      const text = (timeText || "").trim();
      const m = text.match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return Number.POSITIVE_INFINITY;
      const hh = Number(m[1]);
      const mm = Number(m[2]);
      if (Number.isNaN(hh) || Number.isNaN(mm)) return Number.POSITIVE_INFINITY;
      return hh * 60 + mm;
    }

    function renderListView() {
      if (!listContainerEl) return;

      listContainerEl.innerHTML = "";
      if (!state.matches.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No hay partidos para mostrar.";
        listContainerEl.appendChild(empty);
        return;
      }

      const selectedDay = dayFilterEl.value || "";
      const teamSearch = normalizeText(teamFilterEl.value || "");
      const filtered = state.matches
        .slice()
        .filter((match) => !selectedDay || match.date === selectedDay)
        .filter((match) => {
          if (!teamSearch) return true;
          const localName = normalizeText(match.slots.local.team || "");
          const visitorName = normalizeText(match.slots.visitante.team || "");
          return localName.includes(teamSearch) || visitorName.includes(teamSearch);
        });

      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No hay partidos para esa fecha.";
        listContainerEl.appendChild(empty);
        return;
      }

      const groups = new Map();
      const dayOrder = [];
      for (const match of filtered) {
        const day = match.date || "Sin fecha";
        if (!groups.has(day)) {
          groups.set(day, []);
          dayOrder.push(day);
        }
        groups.get(day).push(match);
      }

      for (const day of dayOrder) {
        groups.get(day).sort((a, b) => {
          const ta = parseKickoffMinutes(a.time);
          const tb = parseKickoffMinutes(b.time);
          if (ta !== tb) return ta - tb;
          return a.id - b.id;
        });

        const group = document.createElement("section");
        group.className = "list-group";

        const title = document.createElement("h3");
        title.className = "list-group-title";
        title.textContent = day;
        group.appendChild(title);

        for (const match of groups.get(day)) {
          const item = document.createElement("article");
          item.className = "list-item";

          const meta = document.createElement("div");
          meta.className = "list-item-meta";
          const p = document.createElement("div");
          p.textContent = `P${match.id} · ${match.phase}`;
          const t = document.createElement("div");
          t.className = "list-item-time";
          t.textContent = match.time || "Por confirmar";
          meta.appendChild(p);
          meta.appendChild(t);

          const teams = document.createElement("div");
          teams.className = "teams-inline";
          teams.appendChild(buildTeamInline(match.slots.local.team));
          teams.appendChild(buildTeamInline(match.slots.visitante.team));

          const winner = document.createElement("div");
          winner.className = "winner-chip";
          winner.textContent = match.selectedWinnerSide
            ? `Ganador: ${match.slots[match.selectedWinnerSide].team}`
            : "Sin ganador";

          item.appendChild(meta);
          item.appendChild(teams);
          item.appendChild(winner);
          group.appendChild(item);
        }

        listContainerEl.appendChild(group);
      }
    }

    function updateUIFromState() {
      for (const match of state.matches) {
        const card = queryMatchCard(match.id);
        if (!card) continue;

        for (const side of ["local", "visitante"]) {
          const btn = queryTargetButton(match.id, side);
          if (!btn) continue;
          const teamName = match.slots[side].team;
          btn.disabled = !teamName;
          btn.classList.toggle("winner", match.selectedWinnerSide === side);
          mountTeamContent(btn, teamName || "Por definir");
        }

        const hint = card.querySelector(".hint");
        if (hint) {
          hint.textContent = match.selectedWinnerSide
            ? `Ganador elegido: ${match.slots[match.selectedWinnerSide].team}`
            : "Haz clic en un equipo para marcar ganador";
        }
      }

      drawConnections();
      renderListView();
    }

    function getPointFromRect(rect, originRect, place) {
      const xBase = rect.left - originRect.left + boardWrapEl.scrollLeft;
      const yBase = rect.top - originRect.top + boardWrapEl.scrollTop;
      if (place === "left") return { x: xBase, y: yBase + rect.height / 2 };
      if (place === "right") return { x: xBase + rect.width, y: yBase + rect.height / 2 };
      return { x: xBase + rect.width / 2, y: yBase + rect.height / 2 };
    }

    function drawConnections() {
      const wrapRect = boardWrapEl.getBoundingClientRect();
      const width = boardEl.scrollWidth;
      const height = boardEl.scrollHeight;
      connectionsEl.setAttribute("width", String(width));
      connectionsEl.setAttribute("height", String(height));
      connectionsEl.setAttribute("viewBox", `0 0 ${width} ${height}`);
      connectionsEl.innerHTML = "";

      for (const target of state.matches) {
        for (const side of ["local", "visitante"]) {
          const sourceRef = target.slots[side].source;
          if (!sourceRef) continue;

          const sourceMatch = state.byId.get(sourceRef.matchId);
          if (!sourceMatch) continue;

          const sourceCard = queryMatchCard(sourceRef.matchId);
          const targetBtn = queryTargetButton(target.id, side);
          if (!sourceCard || !targetBtn) continue;

          const sourceSide = state.sideById.get(sourceRef.matchId);
          const targetSide = state.sideById.get(target.id);

          let startAnchor = "right";
          let endAnchor = "left";

          if (sourceSide === "right") startAnchor = "left";
          if (targetSide === "right") endAnchor = "right";
          if (targetSide === "center" && sourceSide === "right") endAnchor = "right";
          if (targetSide === "center" && sourceSide === "left") endAnchor = "left";

          const start = getPointFromRect(sourceCard.getBoundingClientRect(), wrapRect, startAnchor);
          const end = getPointFromRect(targetBtn.getBoundingClientRect(), wrapRect, endAnchor);
          const midX = (start.x + end.x) / 2;

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", `M ${start.x} ${start.y} C ${midX} ${start.y}, ${midX} ${end.y}, ${end.x} ${end.y}`);
          path.setAttribute("class", "connection-line");

          if (sourceRef.outcome === "winner" && sourceMatch.selectedWinnerSide) {
            const winnerName = sourceMatch.slots[sourceMatch.selectedWinnerSide].team;
            const targetName = target.slots[side].team;
            if (winnerName && targetName && winnerName === targetName) {
              path.classList.add("active");
            }
          }

          connectionsEl.appendChild(path);
        }
      }
    }

    function render() {
      boardEl.innerHTML = "";
      boardEl.removeAttribute("style");

      if (!state.matches.length) {
        connectionsEl.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No hay datos para mostrar.";
        boardEl.appendChild(empty);
        return;
      }

      const layout = calculateLayout();
      state.layout = layout;
      boardEl.style.width = `${layout.width}px`;
      boardEl.style.height = `${layout.height}px`;

      renderRoundLabels(layout);

      for (const match of state.matches) {
        const placement = layout.positions.get(match.id);
        if (!placement) continue;
        const card = renderMatch(match, placement);
        if (match.id === 104 || match.id === 103) {
          card.classList.add("center-match");
        }
        boardEl.appendChild(card);
      }

      drawConnections();
    }

    async function loadDefaultCsv(options = {}) {
      const applyStored = options.applyStoredPicks !== false;
      const clearStored = options.clearStoredPicks === true;
      try {
        const sheetRaw = (sheetUrlEl.value || savedSheetUrl()).trim();
        if (sheetRaw) {
          sheetUrlEl.value = sheetRaw;
          if (googleSheetToCsvUrl(sheetRaw).length) {
            const loaded = await loadSheetFromRawUrl(sheetRaw, { applyStoredPicks: applyStored, clearStoredPicks: clearStored });
            if (loaded) {
              setStatus("CSV cargado desde Google Sheet guardada.");
              return;
            }
            setStatus("No pude cargar la Google Sheet guardada. Intento con CSV local...");
          }
        }

        if (window.location.protocol === "file:") {
          setStatus("Si abres este HTML con doble clic, algunos navegadores bloquean leer CSV local. Mejor usa un servidor local.");
        }

        const response = await fetch(encodeURI(CSV_FILE), { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const csvText = await response.text();

        if (clearStored) clearStoredPicks();
        buildFromCsv(csvText, { applyStoredPicks: applyStored });
        storeSheetUrl("");
        sheetUrlEl.value = "";
        setStatus(`CSV cargado: ${CSV_FILE}`);
      } catch (err) {
        setStatus("No pude leer el CSV automáticamente. Usa 'Cargar otro CSV' o levanta servidor local.");
        boardEl.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = "No se pudo cargar el CSV base.<br>Prueba con 'Cargar otro CSV' o ejecuta un servidor local en esta carpeta.";
        boardEl.appendChild(empty);
      }
    }

    window.addEventListener("resize", () => {
      if (state.matches.length && state.activeView === "bracket") drawConnections();
    });

    boardWrapEl.addEventListener("scroll", () => {
      if (state.matches.length && state.activeView === "bracket") drawConnections();
    });

    loadDefaultCsv();
  </script>
</body>
</html>
